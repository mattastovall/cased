    <script>
      const grid = document.getElementById("card-grid");
      const status = document.getElementById("status");
      const dataset = JSON.parse(document.getElementById("request-data").textContent);
      const modal = document.getElementById("asset-modal");
      const modalTitle = document.getElementById("modal-title");
      const modalSubtitle = document.getElementById("modal-subtitle");
      const modalStage = document.getElementById("modal-stage");
      const modalDownload = document.getElementById("modal-download");
      const modalClose = document.getElementById("modal-close");

      const modelLinkOverrides = {
        "fal-ai/kling-video/v3/pro/image-to-video": {
          model: "https://fal.ai/models/fal-ai/kling-video/o3/pro/reference-to-video/playground",
          endpoint: "https://fal.ai/models/fal-ai/kling-video/o3/pro/reference-to-video/playground"
        }
      };

      const formatValue = (value) => {
        if (value === null) return "null";
        if (Array.isArray(value)) return value.length ? value.join(", ") : "[]";
        if (typeof value === "object") return JSON.stringify(value);
        return String(value);
      };

      const formatDate = (value) => {
        if (!value) return "n/a";
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return String(value);
        return new Intl.DateTimeFormat(undefined, {
          dateStyle: "medium",
          timeStyle: "short"
        }).format(date);
      };

      const escapeHtml = (value) =>
        String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");

      const formatKeyLabel = (value) =>
        String(value || "")
          .replaceAll("_", " ")
          .replaceAll("-", " ")
          .replace(/\b\w/g, (char) => char.toUpperCase());

      const formatRequestTitle = (name) => {
        return escapeHtml(
          String(name || "")
          .split("-")
          .filter(Boolean)
          .map((part) => part.charAt(0).toUpperCase() + part.slice(1))
          .join(" ")
        );
      };

      const buildSettings = (settings) => {
        const entries = Object.entries(settings || {});
        if (!entries.length) {
          return '<div class="empty">No explicit model settings recorded.</div>';
        }
        return entries
          .map(
            ([key, value]) => `
              <div class="setting">
                <span class="setting-key">${escapeHtml(formatKeyLabel(key))}</span>
                <span class="setting-value">${escapeHtml(formatValue(value))}</span>
              </div>
            `
          )
          .join("");
      };

      const buildImageGrid = (items) => {
        if (!items || !items.length) {
          return '<div class="empty">No images attached.</div>';
        }
        return `
          <div class="media-grid">
            ${items
              .map(
                ({ url, label }) => `
                  <div class="asset-meta">
                    <button class="thumb" type="button" data-asset-kind="image" data-asset-url="${escapeHtml(url)}" data-asset-label="${escapeHtml(label)}">
                      <img src="${escapeHtml(url)}" alt="${escapeHtml(label)}">
                    </button>
                    ${label ? `<div class="asset-caption">${escapeHtml(label)}</div>` : ""}
                  </div>
                `
              )
              .join("")}
          </div>
        `;
      };

      const buildVideoGrid = (urls, showCaptions = true) => {
        if (!urls || !urls.length) {
          return '<div class="empty">No videos attached.</div>';
        }
        return `
          <div class="media-grid">
            ${urls
              .map((url, index) => ({ url, index }))
              .map(
                ({ url, index }) => `
                  <div class="asset-meta">
                    <button class="thumb video-wrap" type="button" data-asset-kind="video" data-asset-url="${escapeHtml(url)}" data-asset-label="Video ${index + 1}">
                      <video autoplay muted loop playsinline preload="metadata" src="${escapeHtml(url)}"></video>
                    </button>
                    ${showCaptions ? `<div class="asset-caption">Video ${index + 1}</div>` : ""}
                  </div>
                `
              )
              .join("")}
          </div>
        `;
      };

      const openAssetModal = (kind, url, label) => {
        modalTitle.textContent = label || (kind === "video" ? "Video" : "Image");
        modalSubtitle.textContent = url;
        modalDownload.href = url;
        modalDownload.download = `${(label || (kind === "video" ? "video" : "image")).toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "") || "asset"}.${kind === "video" ? "mp4" : "png"}`;
        modalStage.innerHTML = kind === "video"
          ? `<video controls autoplay muted loop playsinline src="${escapeHtml(url)}"></video>`
          : `<img src="${escapeHtml(url)}" alt="${escapeHtml(label || "Asset")}">`;
        modal.hidden = false;
        document.body.style.overflow = "hidden";
      };

      const closeAssetModal = () => {
        modal.hidden = true;
        modalStage.innerHTML = "";
        modalDownload.href = "#";
        modalDownload.download = "";
        document.body.style.overflow = "";
      };

      const copyPrompt = async (text) => {
        if (!text) return false;
        if (navigator.clipboard?.writeText) {
          await navigator.clipboard.writeText(text);
          return true;
        }

        const textarea = document.createElement("textarea");
        textarea.value = text;
        textarea.setAttribute("readonly", "");
        textarea.style.position = "absolute";
        textarea.style.left = "-9999px";
        document.body.appendChild(textarea);
        textarea.select();
        const didCopy = document.execCommand("copy");
        document.body.removeChild(textarea);
        return didCopy;
      };

      const isVideoRequest = (request) => {
        if (request.output_video_urls?.length) return true;
        if (request.model?.operation?.includes("video")) return true;
        return request.request_name?.toLowerCase().endsWith("-video") || false;
      };

      const requestDisplayPriority = {
        "chestplate-from-Ref-image": 0,
        "chestplate-ansysSimulation-image": 1
      };

      const hiddenRequestNames = new Set([
        "chestplate-strike-video"
      ]);

      const buildCard = (request, index) => {
        const isKlingVideo = request.endpoint === "fal-ai/kling-video/v3/pro/image-to-video";
        const linkOverride = modelLinkOverrides[request.endpoint] || {};
        const modelPageUrl = linkOverride.model || (request.model?.model_id ? `https://fal.ai/models/${request.model.model_id}` : null);
        const endpointUrl = linkOverride.endpoint || (request.endpoint ? `https://fal.ai/models/${request.endpoint}` : null);
        const inputItems = (request.input_image_urls || []).map((url, inputIndex) => {
          if (isKlingVideo) {
            return {
              url,
              label: inputIndex === 0 ? "First" : inputIndex === 1 ? "Last" : `Input ${inputIndex + 1}`
            };
          }
          return { url, label: `Input ${inputIndex + 1}` };
        });
        const outputImageItems = (request.output_image_urls || []).map((url, outputIndex) => ({
          url,
          label: `Output ${outputIndex + 1}`
        }));

        const article = document.createElement("article");
        article.className = "card";
        article.innerHTML = `
          <div class="card-header">
            <div class="card-header-top">
              <div class="section-title">${endpointUrl ? `<a class="section-title-link" href="${escapeHtml(endpointUrl)}" target="_blank" rel="noreferrer">${escapeHtml(request.endpoint || endpointUrl)}</a>` : escapeHtml(request.endpoint || `RQ-${String(index + 1).padStart(2, "0")}`)}</div>
            </div>
            <h2 class="card-title">${formatRequestTitle(request.request_name)}</h2>
          </div>

          <section class="section">
            <div class="section-title">Output</div>
            ${request.output_video_urls?.length ? buildVideoGrid(request.output_video_urls, false) : buildImageGrid(outputImageItems)}
          </section>

          <section class="section">
            <div class="card-header-top">
              <div class="section-title">Prompt</div>
              <button class="copy-button compact" type="button" data-copy-prompt="${escapeHtml(request.payload?.prompt || "")}">Copy Prompt</button>
            </div>
            <p class="subtle">${escapeHtml(request.payload?.prompt || "No prompt recorded.")}</p>
          </section>

          <section class="section input-section">
            <div class="section-title">${isKlingVideo ? "Frames" : "Inputs"}</div>
            ${buildImageGrid(inputItems)}
          </section>

          <details class="details-toggle">
            <summary><span>Details</span><span class="details-arrow">↓</span></summary>
            <div class="details-body">
              <div class="link-row">
                ${modelPageUrl ? `<a class="inline-link" href="${escapeHtml(modelPageUrl)}" target="_blank" rel="noreferrer">Model</a>` : ""}
              </div>

              <section class="section">
                <div class="section-title">Model Settings</div>
                <div class="settings">${buildSettings(request.model_settings)}</div>
              </section>
            </div>
          </details>
        `;
        return article;
      };

      const renderDataset = (sourceDataset, sourceLabel) => {
        grid.innerHTML = "";
        const requests = (sourceDataset.requests || []).filter((request) => !hiddenRequestNames.has(request.request_name));
        const groupedRequests = [
          {
            title: "Video Examples",
            items: requests.filter((request) => isVideoRequest(request))
          },
          {
            title: "Image Examples",
            items: requests.filter((request) => !isVideoRequest(request))
          }
        ];

        groupedRequests.forEach((group) => {
          if (!group.items.length) return;

          const section = document.createElement("section");
          section.className = "request-group";

          const heading = document.createElement("div");
          heading.className = "group-heading";
          heading.textContent = group.title;
          section.appendChild(heading);

          const groupGrid = document.createElement("div");
          groupGrid.className = "grid";
          group.items
            .slice()
            .sort((left, right) => {
              const leftPriority = requestDisplayPriority[left.request_name] ?? Number.MAX_SAFE_INTEGER;
              const rightPriority = requestDisplayPriority[right.request_name] ?? Number.MAX_SAFE_INTEGER;
              return leftPriority - rightPriority;
            })
            .forEach((request, index) => {
            groupGrid.appendChild(buildCard(request, index));
            });

          section.appendChild(groupGrid);
          grid.appendChild(section);
        });
        status.innerHTML = `Loaded ${escapeHtml(sourceDataset.request_count || 0)} requests from <code>${escapeHtml(sourceLabel)}</code> / <code>${escapeHtml(sourceDataset.bucket || "no bucket")}</code>`;
      };

      grid.addEventListener("click", async (event) => {
        const asset = event.target.closest("[data-asset-url]");
        if (asset) {
          openAssetModal(asset.dataset.assetKind, asset.dataset.assetUrl, asset.dataset.assetLabel);
          return;
        }

        const copyButton = event.target.closest("[data-copy-prompt]");
        if (!copyButton) return;

        const previousLabel = copyButton.textContent;
        try {
          const didCopy = await copyPrompt(copyButton.dataset.copyPrompt);
          copyButton.textContent = didCopy ? "Copied" : "Failed";
        } catch (error) {
          copyButton.textContent = "Failed";
        }

        setTimeout(() => {
          copyButton.textContent = previousLabel;
        }, 1200);
      });

      modalClose.addEventListener("click", closeAssetModal);
      modal.addEventListener("click", (event) => {
        if (event.target === modal) closeAssetModal();
      });
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && !modal.hidden) {
          closeAssetModal();
        }
      });

      renderDataset(dataset, "embedded request data");
    </script>
